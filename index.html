<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hera</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- NAVBAR -->

    <nav>

        <div class="nav-left">

            <!-- LEFT SIDEBAR BUTTON -->

            <button class="menu-btn"
            id="menuBtn">

                ☰

            </button>

            <a href="#home">

                <img src="images/WhatsApp_Image_2026-05-13_at_11.03.58_PM-removebg-preview.png"
                class="nav-logo">

            </a>

        </div>


        <!-- CART ICON -->
        
        <div class="cart-icon"
        onclick="toggleCart()">

            🛒

            <span class="cart-count"
            id="cartCount">

                0

            </span>

        </div>

    </nav>

    <!-- LEFT SIDEBAR -->

    <div class="sidebar collapsed"
    id="sidebar">

        <ul>

            <li>
                <a href="#home">
                    Home
                </a>
            </li>

            <li>
                <a href="#categories">
                    Categories
                </a>
            </li>

            <li>
                <a href="#contact">
                    Contact
                </a>
            </li>

        </ul>

    </div>

    <!-- OVERLAY -->

    <div class="overlay"
    id="overlay"></div>

    <!-- MAIN CONTENT -->

    <div class="container">

        <!-- HERO -->

        <section class="hero"
        id="home">

            <h1>HERA</h1>

            <p>

                Premium handcrafted products
                designed with elegance and durability.

            </p>

        </section>

        <!-- CATEGORIES -->

        <section class="categories"
        id="categories">

            <h1>Categories</h1>

            <div class="products"
            id="productsContainer">

            </div>

        </section>

        <!-- CONTACT -->

        <section class="contact"
        id="contact">

            <h1>Contact</h1>

            <p>Email: admin@gmail.com</p>

            <p>Phone: +91 12345 67890</p>
        </section>

    </div>

<!-- RIGHT CART SIDEBAR -->

<div class="cart-sidebar">

    <h2>Your Cart</h2>

    <div id="cartItems"></div>

    <!-- CART FOOTER -->

    <div class="cart-footer">

        <div class="cart-total">

            <span>Total</span>

            <span id="cartTotal">

                ₹0

            </span>

        </div>

        <button class="whatsapp-order-btn"
        onclick="placeOrder()">

            Place Order on WhatsApp

        </button>

    </div>

</div>

    <!-- SCRIPTS -->

    <script src="categories.js"></script>

    <script src="products.js"></script>

    <script src="cart.js"></script>

    <script src="home.js"></script>

    <!-- LEFT SIDEBAR JS -->

    <script>

    const menuBtn =
    document.getElementById("menuBtn");

    const sidebar =
    document.getElementById("sidebar");

    const overlay =
    document.getElementById("overlay");

    menuBtn.addEventListener("click", () => {

        const isCollapsed =
        sidebar.classList.contains("collapsed");

        if(isCollapsed){

            /* Close cart if open */

            document.body.classList.remove("cart-open");

            sidebar.classList.remove("collapsed");

            overlay.classList.add("active");

        } else {

            sidebar.classList.add("collapsed");

            overlay.classList.remove("active");
        }
    });

    overlay.addEventListener("click", () => {

        /* Closes whichever sidebar is open */

        sidebar.classList.add("collapsed");

        document.body.classList.remove("cart-open");

        overlay.classList.remove("active");
    });

</script>

</body>

</html>
